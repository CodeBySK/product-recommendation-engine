services:

  # ── ZOOKEEPER ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - retail-net

  # ── KAFKA BROKER ───────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    networks:
      - retail-net

  # ── KAFKA UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-retail
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - retail-net

  # ── POSTGRESQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres-retail
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: retail
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - retail-net

  # ── REDIS ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7
    container_name: redis-retail
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - retail-net

  # ── JUPYTER + SPARK ────────────────────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter-retail
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "4040:4040"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: ""                      # ← disables token auth
      NOTEBOOK_ARGS: "--NotebookApp.token='' --NotebookApp.password=''"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./spark-jobs:/home/jovyan/spark-jobs
    networks:
      - retail-net

  # ── MLFLOW ─────────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: mlflow
    restart: unless-stopped
    ports:
      - "5001:5000"
    command: mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow-data:/mlflow
    networks:
      - retail-net

# ── VOLUMES ────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  mlflow-data:

# ── NETWORK ────────────────────────────────────────────────────────────────
networks:
  retail-net:
    driver: bridge